name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer install --ignore-platform-req=ext-xberg --no-interaction --no-progress

      - run: vendor/bin/phpunit

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: pie
          coverage: none

      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - run: sudo pie install xberg-io/xberg

      - run: php -m | grep -i xberg

      - run: composer install --no-interaction --no-progress

      - run: vendor/bin/phpunit
