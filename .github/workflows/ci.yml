name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer install --ignore-platform-req=ext-xberg --no-interaction --no-progress

      - run: vendor/bin/phpunit

  integration:
    # ponytail: xberg's prebuilt .so needs libheif >= 1.19; 24.04 ships 1.17
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: pie
          coverage: none

      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr libheif1

      - run: sudo pie install "xberg-io/xberg:^1.0.0-rc.29" || true

      - run: |
          php -dextension=xberg -r 'var_dump(extension_loaded("xberg"));'
          ldd /usr/lib/php/20240924/xberg.so | grep -i 'not found' || true

      - run: php -m | grep -i xberg

      - run: composer install --no-interaction --no-progress

      - run: vendor/bin/phpunit
